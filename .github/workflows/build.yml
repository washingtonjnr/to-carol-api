name: Build
 
on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
 
      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Build (skip tests)
        run: ./mvnw clean install -Dmaven.test.skip=true
 