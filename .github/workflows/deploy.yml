name: Deploy 

on:
  workflow_run:
    workflows: ["Build", "Test"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ 
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    }}
    runs-on: ubuntu-latest

    steps:
      - name: Check both workflows status
        uses: actions/github-script@v7
        id: check

        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.workflow_run.head_sha;

            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: sha,
            });

            const required = ["Build", "Test"];

            const statusMap = {};

            for (const run of runs.data.workflow_runs) {
              if (required.includes(run.name)) {
                statusMap[run.name] = run.conclusion;
              }
            }

            const allPassed = required.every(
              name => statusMap[name] === "success"
            );

            if (!allPassed) {
              core.setFailed(`Not all workflows passed: ${JSON.stringify(statusMap)}`);
            }

      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: bash <(curl -fsSL cli.new/install)

      - name: Deploy
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}